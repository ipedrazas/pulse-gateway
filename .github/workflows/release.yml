name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (e.g., v0.2.0)"
        required: true
        type: string
      prerelease:
        description: "Mark as pre-release"
        required: false
        default: false
        type: boolean

permissions:
  contents: write

jobs:
  # ---------------------------------------------------------------------------
  # Build macOS DMG via Tauri
  # ---------------------------------------------------------------------------
  build:
    name: Build macOS
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Extract version
        id: version
        run: echo "version=${VERSION#v}" >> "$GITHUB_OUTPUT"
        env:
          VERSION: ${{ inputs.version }}

      - name: Set version in tauri.conf.json
        run: |
          cd src-tauri
          sed -i '' 's/"version": ".*"/"version": "${{ steps.version.outputs.version }}"/' tauri.conf.json

      - name: Set version in Cargo.toml
        run: |
          cd src-tauri
          sed -i '' 's/^version = ".*"/version = "${{ steps.version.outputs.version }}"/' Cargo.toml

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install Bun
        uses: oven-sh/setup-bun@v2

      - name: Install frontend dependencies
        run: bun install

      - name: Build Tauri app
        run: bun run tauri build

      - name: Collect artifacts
        run: |
          mkdir -p artifacts
          cp src-tauri/target/release/bundle/dmg/*.dmg artifacts/
          cp src-tauri/target/release/bundle/macos/*.app.tar.gz artifacts/ 2>/dev/null || true

      - uses: actions/upload-artifact@v4
        with:
          name: pulse-gateway-macos
          path: artifacts/*

  # ---------------------------------------------------------------------------
  # GitHub Release
  # ---------------------------------------------------------------------------
  release:
    name: GitHub Release
    runs-on: ubuntu-latest
    needs: [build]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: pulse-gateway-*
          merge-multiple: true

      - name: Generate SHA256 checksums
        working-directory: artifacts
        run: |
          sha256sum * > checksums-sha256.txt
          cat checksums-sha256.txt

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.version }}
          name: Release ${{ inputs.version }}
          generate_release_notes: true
          prerelease: ${{ inputs.prerelease }}
          files: artifacts/*
