# A2 Configuration
# Generated by: a2 add
#
# Run checks with: a2 check

# Using all default settings
# Uncomment and modify as needed:
#
language:
  explicit: [rust, typescript]
  typescript:
    coverage_threshold: 45

  rust:
    source_dir: [src-tauri]
    coverage_threshold: 45
#
files:
  required:
    - README.md
    - LICENSE
#
# coverage:
#   threshold: 80
#
checks:
  disabled:
    - devops:*
    - common:retry
    - common:migrations
    - common:config_validation
    - common:errors
    - common:tracing
    - common:metrics
    - common:e2e
    - common:integration
    - common:api_docs
    - common:license
    - common:shutdown
    - security:filesystem
    - security:network
    - common:env
    - common:dockerfile
    - common:health
    - "*:logging"
